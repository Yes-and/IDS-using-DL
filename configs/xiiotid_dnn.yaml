dataset: xiiotid
arch: dnn

data:
  raw_path: data/raw/xiiotid
  processed_path: data/processed/xiiotid
  label_column: class1

training:
  n_folds: 5
  batch_size: 256
  epochs: 40
  learning_rate: 0.001
  class_weight: true

evaluation:
  eval_min_samples: 1000
  test_size: 0.2

output:
  model_dir: results/models
  metrics_dir: results/metrics
  figures_dir: results/figures
